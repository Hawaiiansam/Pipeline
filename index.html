<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Land Opportunity Intake - Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #fafaf9;
    color: #111827;
    line-height: 1.5;
    min-height: 100vh;
  }
  input, select, textarea, button { font-family: inherit; font-size: 16px; }
  input, select, textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d6d3d1;
    border-radius: 6px;
    background: white;
    color: #111827;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: #8b5cf6;
    box-shadow: 0 0 0 3px #ede9fe;
  }
  textarea { min-height: 100px; resize: vertical; font-family: inherit; }
  button { cursor: pointer; }
  header { border-bottom: 1px solid #e7e5e4; background: white; }
  .header-inner {
    max-width: 640px;
    margin: 0 auto;
    padding: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .app-title { font-size: 16px; font-weight: 600; color: #1c1917; }
  .lang-toggle {
    display: inline-flex;
    overflow: hidden;
    border-radius: 6px;
    border: 1px solid #e7e5e4;
    font-size: 13px;
  }
  .lang-toggle button {
    padding: 6px 12px;
    background: white;
    color: #44403c;
    border: none;
    font-weight: 500;
  }
  .lang-toggle button.active { background: #7c3aed; color: white; }
  main { max-width: 640px; margin: 0 auto; padding: 24px 16px 96px; }
  .page-header { margin-bottom: 16px; }
  .page-header h1 { font-size: 20px; font-weight: 600; color: #1c1917; margin-bottom: 4px; }
  .page-header p { font-size: 14px; color: #57534e; }

  /* Home page */
  .home-hero {
    text-align: center;
    margin-bottom: 32px;
    padding: 24px 0 8px;
  }
  .home-hero h1 { font-size: 24px; font-weight: 700; color: #1c1917; margin-bottom: 8px; }
  .home-hero p { font-size: 14px; color: #57534e; }
  .home-cards { display: flex; flex-direction: column; gap: 16px; }
  .home-card {
    background: white;
    border: 1px solid #e7e5e4;
    border-radius: 12px;
    padding: 24px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    width: 100%;
  }
  .home-card:hover {
    border-color: #8b5cf6;
    box-shadow: 0 4px 12px rgba(124, 58, 237, 0.08);
    transform: translateY(-1px);
  }
  .home-card-icon {
    flex-shrink: 0;
    width: 48px;
    height: 48px;
    border-radius: 10px;
    background: #ede9fe;
    color: #6d28d9;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 700;
  }
  .home-card-content { flex: 1; }
  .home-card-content h3 { font-size: 16px; font-weight: 600; color: #1c1917; margin-bottom: 4px; }
  .home-card-content p { font-size: 13px; color: #57534e; }
  .home-card-arrow { color: #a8a29e; font-size: 20px; align-self: center; }

  /* Serial number display */
  .serial-card {
    background: white;
    border: 1px solid #e7e5e4;
    border-radius: 12px;
    padding: 32px 24px;
    text-align: center;
    margin-bottom: 16px;
  }
  .serial-label {
    font-size: 13px;
    color: #78716c;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 12px;
    font-weight: 500;
  }
  .serial-number {
    font-size: 48px;
    font-weight: 700;
    color: #6d28d9;
    letter-spacing: 0.1em;
    font-family: 'SF Mono', Monaco, Consolas, monospace;
    margin-bottom: 12px;
  }
  .serial-help {
    font-size: 13px;
    color: #57534e;
    max-width: 360px;
    margin: 0 auto;
  }
  .serial-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #ede9fe;
    color: #6d28d9;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .serial-input {
    font-size: 32px !important;
    text-align: center;
    letter-spacing: 0.2em;
    font-family: 'SF Mono', Monaco, Consolas, monospace;
    font-weight: 600;
    padding: 16px !important;
  }
  .error-banner {
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 13px;
    color: #991b1b;
    margin-bottom: 12px;
  }
  .back-link {
    background: none;
    border: none;
    color: #6d28d9;
    font-size: 14px;
    font-weight: 500;
    padding: 8px 0;
    margin-bottom: 8px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .back-link:hover { text-decoration: underline; }

  /* Project picker cards */
  .project-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
  .project-card {
    background: white;
    border: 1px solid #e7e5e4;
    border-radius: 10px;
    padding: 16px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .project-card:hover {
    border-color: #8b5cf6;
    box-shadow: 0 2px 8px rgba(124, 58, 237, 0.08);
  }
  .project-card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .project-card-serial {
    font-family: 'SF Mono', Monaco, Consolas, monospace;
    font-weight: 700;
    color: #6d28d9;
    font-size: 18px;
    letter-spacing: 0.05em;
  }
  .project-card-date {
    font-size: 12px;
    color: #78716c;
  }
  .project-card-location {
    font-size: 15px;
    font-weight: 600;
    color: #1c1917;
  }
  .project-card-meta {
    font-size: 13px;
    color: #57534e;
  }
  .project-card-note {
    font-size: 13px;
    color: #44403c;
    font-style: italic;
    margin-top: 2px;
  }

  /* Tabs */
  .tab-bar {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid #e7e5e4;
    margin-bottom: 24px;
    margin-top: 16px;
  }
  .tab-btn {
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 500;
    color: #57534e;
    cursor: pointer;
    margin-bottom: -1px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.15s;
  }
  .tab-btn:hover { color: #1c1917; border-bottom-color: #d6d3d1; }
  .tab-btn.active { color: #6d28d9; border-bottom-color: #7c3aed; }
  .tab-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 20px;
    height: 20px;
    padding: 0 6px;
    border-radius: 999px;
    background: #e7e5e4;
    color: #44403c;
    font-size: 11px;
    font-weight: 600;
  }
  .tab-btn.active .tab-badge { background: #ede9fe; color: #6d28d9; }

  .section { margin-bottom: 24px; }
  .section-header { margin-bottom: 12px; }
  .section-header h2 { font-size: 16px; font-weight: 600; color: #1c1917; }
  .section-header p { font-size: 12px; color: #78716c; margin-top: 4px; }
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .field label { font-size: 14px; font-weight: 500; color: #292524; }
  .field .help { font-size: 12px; color: #78716c; }
  .field .req { color: #dc2626; margin-left: 2px; }
  .row { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; }
  .pill-group { display: flex; flex-wrap: wrap; gap: 8px; }
  .pill {
    padding: 6px 12px;
    border: 1px solid #d6d3d1;
    background: white;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 500;
    color: #44403c;
    cursor: pointer;
    transition: all 0.15s;
  }
  .pill:hover { background: #f5f5f4; }
  .pill.active { border-color: #7c3aed; background: #f5f3ff; color: #6d28d9; }
  .submit-btn {
    width: 100%;
    padding: 14px;
    background: #7c3aed;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    font-weight: 600;
    margin-top: 8px;
  }
  .submit-btn:hover { background: #6d28d9; }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .secondary-btn {
    padding: 6px 10px;
    background: white;
    border: 1px solid #d6d3d1;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    color: #44403c;
  }
  .dropzone {
    border: 2px dashed #d6d3d1;
    border-radius: 12px;
    padding: 48px 24px;
    text-align: center;
    background: white;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .dropzone:hover { border-color: #8b5cf6; }
  .dropzone p { font-size: 14px; font-weight: 500; color: #44403c; margin-bottom: 4px; }
  .dropzone .small { font-size: 12px; color: #78716c; font-weight: 400; }
  .file-list { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
  .file-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: white;
    border: 1px solid #e7e5e4;
    border-radius: 6px;
    font-size: 14px;
  }
  .extract-success {
    background: #ecfdf5;
    border: 1px solid #a7f3d0;
    border-radius: 6px;
    padding: 12px;
    font-size: 14px;
    color: #065f46;
    margin-bottom: 16px;
  }
  .thank-you {
    background: white;
    border: 1px solid #e7e5e4;
    border-radius: 12px;
    padding: 32px 24px;
    text-align: center;
  }
  .thank-you h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
  .thank-you p { font-size: 14px; color: #57534e; margin-bottom: 24px; }
  .thank-you .serial-card { margin: 16px auto 24px; max-width: 360px; }
  .preview-banner {
    background: #fef3c7;
    border-bottom: 1px solid #fcd34d;
    padding: 8px 16px;
    text-align: center;
    font-size: 12px;
    color: #92400e;
  }
  .translation-note {
    background: #ecfdf5;
    border: 1px solid #a7f3d0;
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 12px;
    color: #047857;
    margin-bottom: 16px;
  }
  @media (max-width: 480px) {
    .row { grid-template-columns: 1fr; }
    .tab-btn { padding: 10px 10px; font-size: 13px; }
    .serial-number { font-size: 40px; }
  }
</style>

function addFiles(list) {
  for (const f of Array.from(list)) {
    if (files.find(x => x.name === f.name && x.size === f.size)) continue;
    files.push(f);

  if (files.length > 10) files = files.slice(0, 10);
  render();
}

function removeFile(idx) {

function togglePill(btn) { btn.classList.toggle('active'); }

async function processExtraction() {
  const msgEl = document.getElementById('msgIn');
  if (msgEl) messageText = msgEl.value;
  if (files.length === 0 && !messageText.trim()) return;

  const MAX_TOTAL_BYTES = 4 * 1024 * 1024;
  let totalBytes = 0;
  for (const f of files) totalBytes += f.size || 0;
  if (totalBytes > MAX_TOTAL_BYTES) {
    alert(locale === 'es' ? 'Archivos demasiado grandes. Total máximo: 4 MB.' : 'Files are too large. Max total: 4 MB.');
    return;
  }

  const readAsDataUrl = (file) => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = () => resolve(reader.result);
    reader.onerror = () => reject(reader.error);
    reader.readAsDataURL(file);
  });

  const btns = document.querySelectorAll('button[onclick="processExtraction()"]');
  btns.forEach(b => { b.disabled = true; b.dataset.orig = b.textContent; b.textContent = tr('process_running'); });

  try {
    const filesPayload = [];
    for (const f of files) {
      const data = await readAsDataUrl(f);
      filesPayload.push({ name: f.name, type: f.type || '', size: f.size || 0, data });
    }
    const res = await fetch('/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ preview: true, files: filesPayload, message: (messageText || '').trim() || null }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.ok) throw new Error(data.error || ('HTTP ' + res.status));
    extractedData = data.extracted || {};
    sourceCount = files.length + (messageText.trim() ? 1 : 0);
    extracted = true;
    activeTab = 'form';
    render();
  } catch (err) {
    alert((locale === 'es' ? 'Error al procesar: ' : 'Processing failed: ') + (err.message || err));
    btns.forEach(b => { b.disabled = false; b.textContent = b.dataset.orig || tr('process_button'); });
  }
}

function simulateExtract() { processExtraction(); }

function showThankYou() {
  // Detect what contact info the hunter provided so we know what channel was used
  const phoneEl = document.querySelector('input[type="tel"]');
  const emailEl = document.querySelector('input[type="email"]');
  const phoneVal = phoneEl ? phoneEl.value.replace(/[^\d]/g, '') : '';
  const emailVal = emailEl ? emailEl.value.trim() : '';
  const hasPhone = phoneVal.length >= 8;
  const hasEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailVal);
  if (hasPhone && hasEmail) sentChannel = 'both';
  else if (hasPhone) sentChannel = 'whatsapp';
  else if (hasEmail) sentChannel = 'email';
  else sentChannel = '';
  view = 'thank_you';
  render();
}

let notionPageUrl = '';

async function submitToBackend(formEl) {
  const btn = document.getElementById('submitBtn');
  const errBox = document.getElementById('submitError');
  if (errBox) { errBox.style.display = 'none'; errBox.textContent = ''; }
  if (btn) { btn.disabled = true; btn.dataset.orig = btn.textContent; btn.textContent = locale === 'es' ? 'Enviando...' : 'Submitting...'; }

  // Collect form fields
  const fd = new FormData(formEl);
  const get = (k) => {
    const v = fd.get(k);
    return v == null ? '' : String(v).trim();
  };
  const num = (k) => {
    const v = get(k);
    if (v === '') return null;
    const n = Number(v);
    return Number.isFinite(n) ? n : null;
  };

  // Normalize land size to hectares
  const rawSize = num('landSize');
  const sizeUnit = get('landSizeUnit') || 'ha';
  const landSizeHa = rawSize == null ? null : (sizeUnit === 'm2' ? rawSize / 10000 : rawSize);

  // Collect selected utility pills
  const utilDisplayMap = { water: 'Water', electricity: 'Electricity', drainage: 'Drainage', none: 'None', unknown: 'Unknown' };
  const utilities = Array.from(document.querySelectorAll('.pill.active[data-util]'))
    .map(el => utilDisplayMap[el.dataset.util])
    .filter(Boolean);

  // Read selected files into base64 for the payload. Cap total raw size at
  // ~3MB so the JSON body (after ~33% base64 inflation) stays under Vercel's 4.5MB limit.
  const MAX_TOTAL_BYTES = 4 * 1024 * 1024;
  let totalBytes = 0;
  for (const f of files) totalBytes += f.size || 0;
  if (totalBytes > MAX_TOTAL_BYTES) {
    if (errBox) {
      errBox.style.display = 'block';
      errBox.textContent = (locale === 'es'
        ? 'Archivos demasiado grandes. Total máximo: 4 MB.'
        : 'Files are too large. Max total: 4 MB.');
    }
    if (btn) { btn.disabled = false; btn.textContent = btn.dataset.orig || (locale === 'es' ? 'Enviar' : 'Submit'); }
    return;
  }

  const readAsDataUrl = (file) => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = () => resolve(reader.result);
    reader.onerror = () => reject(reader.error);
    reader.readAsDataURL(file);
  });

  const filesPayload = [];
  for (const f of files) {
    try {
      const data = await readAsDataUrl(f);
      filesPayload.push({ name: f.name, type: f.type || '', size: f.size || 0, data });
    } catch (e) {
      console.warn('failed to read file', f.name, e);
    }
  }

  const payload = {
    mode: mode === 'existing' ? 'existing' : 'new',
    serial: serialNumber,
    form: {
      hunterName:  get('hunterName'),
      hunterPhone: get('hunterPhone'),
      hunterEmail: get('hunterEmail'),
      state:        get('state'),
      municipality: get('municipality'),
      googleMaps:   get('googleMaps'),
      distance:     num('distance'),
      landSizeHa,
      pricePerM2:   num('pricePerM2'),
      totalPrice:   num('totalPrice'),
      ownership:    get('ownership'),
      landUse:      get('landUse'),
      utilities,
      hunterNotes:  get('hunterNotes'),
    },
    message: (messageText || '').trim() || null,
    files: filesPayload,
  };

  try {
    const res = await fetch('/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.ok) {
      throw new Error(data.error || `HTTP ${res.status}`);
    }
    notionPageUrl = data.url || '';
    showThankYou();
  } catch (err) {
    if (errBox) {
      errBox.style.display = 'block';
      errBox.textContent = (locale === 'es' ? 'Error al enviar: ' : 'Submit failed: ') + (err.message || err);
    }
    if (btn) { btn.disabled = false; btn.textContent = btn.dataset.orig || (locale === 'es' ? 'Enviar' : 'Submit'); }
  }
}

          <div class="field"><label>${tr('land_use')}</label><input type="text" name="landUse" placeholder="${tr('land_use_placeholder')}" value="${v('landUse')}"></div>
          <div class="field"><label>${tr('access')}${req}</label><select name="access"><option>${tr('access_good')}</option><option>${tr('access_fair')}</option><option>${tr('access_poor')}</option><option>${tr('access_unknown')}</option></select></div>
          <div class="field"><label>${tr('utilities')}</label><div class="pill-group">${utilPills}</div></div>
        </div>

        <div class="section">
          <div class="section-header"><h2 style="font-size:14px">${tr('section_attachments')}</h2></div>
          <div class="field"><label>${tr('notes_label')}</label><textarea name="hunterNotes" placeholder="${tr('notes_placeholder')}">${v('hunterNotes')}</textarea></div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">${tr(submitKey)}</button>
        <div id="submitError" style="display:none; margin-top:12px;" class="error-banner"></div>
      </form>
    </div>
  `;
}
function renderForm() {
  const introKey = mode === 'existing' ? 'form_intro_existing' : 'form_intro_new';
  return `
    <button class="back-link" onclick="goHome()">← ${tr('back_to_home')}</button>
    <div class="page-header">
      <h1>${mode === 'existing' ? tr('home_existing_title') : tr('home_new_title')}</h1>
      <p>${tr(introKey)}</p>
    </div>

    <div class="serial-card" style="padding: 16px; margin-bottom: 16px;">
      <div class="serial-label" style="margin-bottom: 4px;">${tr('serial_badge')}</div>
      <div class="serial-number" style="font-size: 28px; margin-bottom: 0;">${serialNumber}</div>
    </div>

    <div class="translation-note">${tr('translation_note')}</div>

    ${renderTabs()}

    ${activeTab === 'upload' ? renderUploadTab() : ''}
    ${activeTab === 'paste' ? renderPasteTab() : ''}
    ${activeTab === 'form' ? renderFormTab() : ''}
  `;
}

function renderThankYou() {
  const isExisting = mode === 'existing';
  const msgKey = isExisting ? 'thank_you_update_message' : 'thank_you_message';
  const serialLabel = isExisting ? tr('serial_badge') : tr('thank_you_serial_label');
  let sentMsg = '';
  if (!isExisting && sentChannel === 'both') sentMsg = tr('thank_you_sent_both');
  else if (!isExisting && sentChannel === 'whatsapp') sentMsg = tr('thank_you_sent_whatsapp');
  else if (!isExisting && sentChannel === 'email') sentMsg = tr('thank_you_sent_email');
  return `
    <div class="thank-you">
      <h1>${tr('thank_you_title')}</h1>
      <p>${tr(msgKey)}</p>
      <div class="serial-card">
        <div class="serial-label">${serialLabel}</div>
        <div class="serial-number">${serialNumber}</div>
        ${sentMsg ? `<p class="serial-help">${sentMsg}</p>` : ''}
      </div>
      <button class="submit-btn" style="max-width:240px; margin: 0 auto;" onclick="goHome()">${tr('return_home')}</button>
    </div>
  `;
}

function render() {
  let html = '';
  if (view === 'home') html = renderHome();
  else if (view === 'new_serial') html = renderNewSerial();
  else if (view === 'existing_input') html = renderExistingInput();
  else if (view === 'forgot_input') html = renderForgotInput();
  else if (view === 'forgot_picker') html = renderForgotPicker();
  else if (view === 'forgot_none') html = renderForgotNone();
  else if (view === 'form') html = renderForm();
  else if (view === 'thank_you') html = renderThankYou();
  document.getElementById('main').innerHTML = html;
}

render();
</script>

</body>
</html>
